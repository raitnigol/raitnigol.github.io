<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>
    {% if page.title and page.title != "" %}
      {{ page.title }} | {{ site.title }}
    {% else %}
      {{ site.title }}
    {% endif %}
  </title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

  <meta property="og:title" content="{% if page.title and page.title != "" %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:image" content="{{ '/assets/social-preview.png' | absolute_url }}">
  <meta name="robots" content="{% if page.robots %}{{ page.robots }}{% else %}index,follow{% endif %}">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% if page.title and page.title != "" %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}">
  <meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta name="twitter:image" content="{{ '/assets/social-preview.png' | absolute_url }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="sitemap" type="application/xml" title="Sitemap" href="{{ '/sitemap.xml' | absolute_url }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/social-preview.png' | relative_url }}">
  <link rel="manifest" href="{{ '/assets/site.webmanifest' | relative_url }}">
  <meta id="theme-color-meta" name="theme-color" content="#ffffff">
  <script>
    (function() {
      var key = "site-theme";
      var stored = null;
      try {
        stored = localStorage.getItem(key);
      } catch (e) {}
      var systemDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      var selected = stored === "light" || stored === "dark" || stored === "system" ? stored : "system";
      var resolved = selected === "system" ? (systemDark ? "dark" : "light") : selected;
      document.documentElement.setAttribute("data-theme", resolved);
      document.documentElement.setAttribute("data-theme-selection", selected);
    })();
  </script>

  <link rel="stylesheet" href="/assets/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
  <header class="site-header">
    <div class="wrapper site-header-inner">
      <div class="site-branding">
        <a class="site-title" href="/">{{ site.title }}</a>
        <p class="site-subtitle">{{ site.description }}</p>
      </div>

      <div class="site-actions">
        <nav class="site-nav-custom" aria-label="Main navigation">
          <a href="/" {% if page.url == "/" %}aria-current="page"{% endif %}>Home</a>
          <a href="/projects/" {% if page.url == "/projects/" %}aria-current="page"{% endif %}>Projects</a>
          <a href="/about/" {% if page.url == "/about/" %}aria-current="page"{% endif %}>About</a>
        </nav>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-live="polite">Theme: System</button>
      </div>
    </div>
  </header>

  <main class="page-content">
    <div class="wrapper">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="wrapper footer-inner">
      <p>Built around <a href="https://github.com/raitnigol" target="_blank" rel="noopener noreferrer">github.com/raitnigol</a></p>
    </div>
  </footer>
  <script>
    (function() {
      var key = "site-theme";
      var toggle = document.getElementById("theme-toggle");
      var root = document.documentElement;
      var themeMeta = document.getElementById("theme-color-meta");
      if (!toggle) return;

      var options = ["system", "light", "dark"];
      var labels = { system: "System", light: "Light", dark: "Dark" };
      var mediaQuery = window.matchMedia ? window.matchMedia("(prefers-color-scheme: dark)") : null;

      function getSelection() {
        var current = root.getAttribute("data-theme-selection");
        if (current === "system" || current === "light" || current === "dark") return current;
        return "system";
      }

      function resolveTheme(selection) {
        if (selection === "system") {
          return mediaQuery && mediaQuery.matches ? "dark" : "light";
        }
        return selection;
      }

      function applyTheme(selection) {
        var resolved = resolveTheme(selection);
        root.setAttribute("data-theme-selection", selection);
        root.setAttribute("data-theme", resolved);
        toggle.textContent = "Theme: " + labels[selection];
        toggle.setAttribute("aria-label", "Theme mode: " + labels[selection] + ". Click to switch.");
        toggle.setAttribute("aria-pressed", selection === "dark" ? "true" : "false");
        if (themeMeta) themeMeta.setAttribute("content", resolved === "dark" ? "#111827" : "#ffffff");
      }

      function storeTheme(selection) {
        try {
          if (selection === "system") {
            localStorage.removeItem(key);
          } else {
            localStorage.setItem(key, selection);
          }
        } catch (e) {}
      }

      toggle.addEventListener("click", function() {
        var current = getSelection();
        var next = options[(options.indexOf(current) + 1) % options.length];
        storeTheme(next);
        applyTheme(next);
      });

      if (mediaQuery) {
        mediaQuery.addEventListener("change", function() {
          if (getSelection() === "system") {
            applyTheme("system");
          }
        });
      }

      applyTheme(getSelection());
    })();
  </script>
</body>
</html>
